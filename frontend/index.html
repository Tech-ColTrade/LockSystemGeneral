<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f6186a'%3E%3Cpath d='M3 7a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4c2.5.4 4 2.3 4 5 0 3-2.2 5-6 5-1.6 0-2.9-.4-3.9-1.2-.7.8-1.8 1.2-3.1 1.2H7a4 4 0 0 1-4-4V7Zm5 3a1.2 1.2 0 1 0 0 2.4A1.2 1.2 0 0 0 8 10Z'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>core · Locking System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Aplica tema/estado del sidebar antes de pintar para evitar parpadeo.
      if (localStorage.theme === 'dark')
        document.documentElement.classList.add('dark')
      if (localStorage.sidebar === 'collapsed')
        document.documentElement.classList.add('side-collapsed')
      // Color de acento persistido ("base|dark|light|fg").
      // Sin selección → Neutro adaptativo por defecto (oscuro en claro, blanco en oscuro).
      try {
        var s = document.documentElement.style
        var raw = localStorage['ls.accent']
        if (raw) {
          var a = raw.split('|')
          if (a.length >= 3) {
            s.setProperty('--color-whale', a[0])
            s.setProperty('--color-whale-dark', a[1])
            s.setProperty('--color-whale-light', a[2])
            if (a[3]) s.setProperty('--primary-foreground', a[3])
          }
        } else {
          s.setProperty('--color-whale', 'var(--foreground)')
          s.setProperty('--color-whale-dark', 'var(--foreground)')
          s.setProperty('--color-whale-light', 'var(--foreground)')
          s.setProperty('--primary-foreground', 'var(--background)')
        }
      } catch (e) {}
    </script>
  </head>
  <body class="font-sans text-gray-900 bg-[#f4f5f7] antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
